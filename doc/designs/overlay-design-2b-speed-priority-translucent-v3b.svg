<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d4271"/>
      <stop offset="60%" stop-color="#1b2646"/>
      <stop offset="100%" stop-color="#0f1730"/>
    </linearGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f8ff" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#edf4ff" stop-opacity="0.52"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#wallpaper)"/>

  <rect x="120" y="230" rx="42" width="840" height="650" fill="url(#frost)" stroke="#e2edff" stroke-opacity="0.78" stroke-width="2"/>

  <text x="540" y="315" text-anchor="middle" fill="#1f3d69" font-size="48" font-family="PingFang SC, Arial" font-weight="600">速度优先模式</text>

  <!-- 顶部双列，吃满宽度 -->
  <text x="180" y="390" fill="#5a79a8" font-size="32" font-family="PingFang SC, Arial">目前最高速度（km/h）</text>
  <text x="900" y="390" text-anchor="end" fill="#5a79a8" font-size="30" font-family="PingFang SC, Arial">当前速度（km/h）</text>

  <text x="180" y="560" fill="#0f56ff" font-size="186" font-family="PingFang SC, Arial" font-weight="700">68.9</text>
  <text x="900" y="560" text-anchor="end" fill="#2a6dff" font-size="132" font-family="PingFang SC, Arial" font-weight="700">22.4</text>

  <line x1="165" y1="595" x2="915" y2="595" stroke="#d5e5ff" stroke-opacity="0.85" stroke-width="2"/>

  <rect x="165" y="640" rx="20" width="750" height="85" fill="#ffffff" fill-opacity="0.28"/>
  <text x="540" y="695" text-anchor="middle" fill="#5c7ea9" font-size="34" font-family="PingFang SC, Arial">速度差值: 46.5 km/h</text>

  <rect x="165" y="755" rx="18" width="350" height="120" fill="#ffffff" fill-opacity="0.40" stroke="#e4edff" stroke-opacity="0.70"/>
  <text x="190" y="825" fill="#5e7aa6" font-size="34" font-family="PingFang SC, Arial">加速度</text>
  <text x="190" y="865" fill="#2f73ff" font-size="40" font-family="PingFang SC, Arial">0.98 m/s²</text>

  <rect x="565" y="755" rx="18" width="350" height="120" fill="#ffffff" fill-opacity="0.40" stroke="#e4edff" stroke-opacity="0.70"/>
  <text x="590" y="825" fill="#5e7aa6" font-size="34" font-family="PingFang SC, Arial">方向角</text>
  <text x="590" y="865" fill="#2f73ff" font-size="40" font-family="PingFang SC, Arial">178°</text>
</svg>

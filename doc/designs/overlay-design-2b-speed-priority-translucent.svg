<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3f6b"/>
      <stop offset="55%" stop-color="#1b2440"/>
      <stop offset="100%" stop-color="#0d1326"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fb3ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7fb3ff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- 模拟桌面壁纸，仅用于预览半透明效果 -->
  <rect width="1080" height="1920" fill="url(#wallpaper)"/>
  <circle cx="920" cy="180" r="240" fill="#6fa2ff" fill-opacity="0.12"/>
  <circle cx="180" cy="1620" r="320" fill="#8ec5ff" fill-opacity="0.08"/>

  <!-- 半透明悬浮窗 -->
  <rect x="130" y="240" rx="40" width="820" height="640" fill="#F7FAFF" fill-opacity="0.58" stroke="#DCE8FF" stroke-opacity="0.75" stroke-width="2"/>
  <rect x="130" y="240" rx="40" width="820" height="640" fill="url(#glow)"/>

  <text x="180" y="320" fill="#203A63" fill-opacity="0.96" font-size="40" font-family="PingFang SC, Arial">速度优先模式</text>

  <text x="180" y="390" fill="#4E6996" fill-opacity="0.92" font-size="30" font-family="PingFang SC, Arial">目前最高速度</text>
  <text x="180" y="515" fill="#1252FF" fill-opacity="0.98" font-size="104" font-family="PingFang SC, Arial" font-weight="700">68.9</text>
  <text x="610" y="515" fill="#4E6996" fill-opacity="0.92" font-size="42" font-family="PingFang SC, Arial">km/h</text>

  <line x1="170" y1="545" x2="910" y2="545" stroke="#D8E6FF" stroke-opacity="0.8" stroke-width="2"/>

  <text x="180" y="615" fill="#5873A0" fill-opacity="0.92" font-size="28" font-family="PingFang SC, Arial">当前速度</text>
  <text x="180" y="710" fill="#2A6DFF" fill-opacity="0.98" font-size="80" font-family="PingFang SC, Arial" font-weight="700">22.4</text>
  <text x="470" y="710" fill="#5E78A4" fill-opacity="0.92" font-size="34" font-family="PingFang SC, Arial">km/h</text>

  <rect x="170" y="745" rx="18" width="350" height="95" fill="#FFFFFF" fill-opacity="0.42" stroke="#E3EEFF" stroke-opacity="0.68"/>
  <text x="195" y="802" fill="#5B749E" fill-opacity="0.95" font-size="28" font-family="PingFang SC, Arial">加速度: 0.98 m/s²</text>

  <rect x="560" y="745" rx="18" width="350" height="95" fill="#FFFFFF" fill-opacity="0.42" stroke="#E3EEFF" stroke-opacity="0.68"/>
  <text x="585" y="802" fill="#5B749E" fill-opacity="0.95" font-size="28" font-family="PingFang SC, Arial">方向角: 178°</text>
</svg>

name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-and-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug -x lint
